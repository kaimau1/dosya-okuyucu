name: APK Derle & Release

# LİMİT POLİTİKASI (2026-07-21): Her push'ta APK derlemek GitHub Actions
# dakikasını ve depolamayı (release/artifact) dolduruyordu. Artık:
#   • test  → her push'ta çalışır (yalnızca `flutter test`; hızlı, APK üretmez).
#   • apk   → SADECE commit mesajı özel işareti içerince, elle dispatch ile ya
#             da main dalında. İşaret bilinçli: normal/açıklama metninde ASLA
#             yazma (bkz. HAFIZA 2026-07-21 — düz "apk" kelimesi kazara tetikledi).
#             İşaret için HAFIZA'daki nota bak (prompt'ta açıkça yazılmaz).

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Ucuz doğrulama: yalnızca feature dallarında (main'de apk işi zaten test
  #    koşuyor; ayrı iş main'de sadece tekrar + APK'yı ~4 dk bekletme demekti). ──
  test:
    name: Testler (hızlı doğrulama)
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.29.3'

      - name: Bağımlılıklar
        run: flutter pub get

      - name: Testler
        run: flutter test

  # ── Pahalı: imzalı APK + Release. Yalnızca istendiğinde çalışır. ────────────
  apk:
    name: Android APK
    runs-on: ubuntu-latest
    # Takılma koruması: build #53'te `flutter build apk` bir Gradle/ağ stall'ında
    # 55 dk asılı kalıp job'ı çökertti (aynı kod bir sonraki koşuda 12 dk'da derlendi).
    # Bu sınır, olası bir takılmanın bir daha ~1 saat CI dakikası yakmasını önler.
    timeout-minutes: 30
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      contains(github.event.head_commit.message, '[release-apk]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.29.3'

      # Gradle/pub bağımlılıklarını koşular arası önbelleğe al: ilk build sonrası
      # indirmeler diskten gelir → hem ~2-4 dk hızlanır hem de ağ stall'ına (build
      # #53'ün 55 dk takılmasının olası kök nedeni) daha az maruz kalınır.
      - name: Gradle & pub önbelleği
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.pub-cache
          key: gradle-pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            gradle-pub-${{ runner.os }}-

      - name: Platform iskeletini üret (android)
        run: |
          set -e
          mkdir -p .backup
          cp -r lib pubspec.yaml .backup/
          [ -d assets ] && cp -r assets .backup/ || true
          [ -f analysis_options.yaml ] && cp analysis_options.yaml .backup/ || true
          flutter create --org com.dosyaokuyucu --project-name dosya_okuyucu --platforms=android .
          cp -r .backup/lib .
          cp .backup/pubspec.yaml .
          [ -d .backup/assets ] && cp -r .backup/assets . || true
          [ -f .backup/analysis_options.yaml ] && cp .backup/analysis_options.yaml . || true
          rm -f test/widget_test.dart   # flutter create'in ürettiği örnek test projeyle uyumsuz

      - name: AndroidManifest'i değiştir (izin + ad + "Birlikte aç"/paylaş)
        run: |
          set -e
          # Elle bakımlı tam manifest'i kopyala: INTERNET izni, uygulama adı,
          # singleTask ve VIEW/SEND intent-filter'ları (başka uygulamalardan
          # gelen dosyaları açmak için). Kırılgan sed yerine tek kaynak.
          cp ci/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          echo "--- Kullanılan AndroidManifest ---"
          grep -E "INTERNET|launchMode|action.VIEW|action.SEND|label=" \
            android/app/src/main/AndroidManifest.xml || true

      - name: minSdk 23 (Firebase için) + NDK sürümü
        run: |
          set -e
          for f in android/app/build.gradle.kts android/app/build.gradle; do
            [ -f "$f" ] || continue
            sed -i -E 's/minSdk(Version)?[[:space:]]*=?[[:space:]]*flutter\.minSdkVersion/minSdk = 23/' "$f"
            # Eklentiler NDK 27 istiyor (uyarı); en yükseğe sabitle (geriye uyumlu).
            grep -q 'ndkVersion' "$f" || \
              sed -i '0,/android {/s//android {\n    ndkVersion = "27.0.12077973"/' "$f"
          done
          echo "--- minSdk/ndk sonrası ---"; grep -R -E "minSdk|ndkVersion" android/app/build.gradle* || true

      - name: Kotlin/Java JVM hedef uyum kontrolünü yumuşat
        run: |
          set -e
          # Eklentiler Kotlin'i 17'ye, Java'yı 8/11'e derliyor (modül-içi uyumsuzluk).
          # Hedefleri DSL/görev ile zorla hizalamak AGP finalization'ıyla çakışıyor
          # ve zaten tutarlı modülleri bozuyor. En sağlam yol: uyum kontrolünü ERROR
          # yerine WARNING yapmak — karışık JVM bytecode Android'de sorun değil.
          echo "kotlin.jvm.target.validation.mode=warning" >> android/gradle.properties
          # Ağ dayanıklılığı: bir bağımlılık indirmesi asılırsa Gradle sonsuza kadar
          # beklemesin — 120 sn'de zaman aşımına uğrayıp yeniden denesin. Böylece
          # geçici bir stall dakikalarca (build #53'te ~55 dk) asılı kalmaz.
          echo "systemProp.org.gradle.internal.http.connectionTimeout=120000" >> android/gradle.properties
          echo "systemProp.org.gradle.internal.http.socketTimeout=120000" >> android/gradle.properties
          echo "--- gradle.properties ---"; tail -8 android/gradle.properties

      - name: Bağımlılıklar
        run: flutter pub get

      - name: Uygulama ikonunu üret (launcher + adaptive)
        run: |
          set -e
          dart run flutter_launcher_icons
          echo "--- üretilen mipmap'ler ---"
          ls -R android/app/src/main/res/mipmap-* 2>/dev/null | head -40 || true

      - name: Testler (pptx render)
        run: flutter test

      - name: APK derle (release)
        run: flutter build apk --release

      - name: İmza anahtarını hazırla (secret varsa kalıcı, yoksa üret)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          set -e
          if [ -n "$KS_B64" ]; then
            # tr: secret'a yapışan CR/boşluk/satır sonu base64'ü bozar ("invalid input")
            printf '%s' "$KS_B64" | tr -d '\r\n \t' | base64 -d > release.jks
            echo "İmza anahtarı repo secret'ından yüklendi (kalıcı)."
          else
            keytool -genkeypair -v -keystore release.jks -storetype PKCS12 \
              -keyalg RSA -keysize 2048 -validity 10000 -alias dosyaokuyucu \
              -storepass DosyaOkuyucuKey2026 -keypass DosyaOkuyucuKey2026 \
              -dname "CN=Dosya Okuyucu, O=DosyaOkuyucu, C=TR"
            echo "::warning::Kalıcı (aynı) imza için ANDROID_KEYSTORE_B64 secret'ı ekleyin. Aşağıdaki base64 değerini kopyalayıp bu isimle repo secret'ı olarak kaydedin. Ekledikten sonra tüm sürümler aynı imzayla derlenir."
            echo "========== ANDROID_KEYSTORE_B64 (kopyala) =========="
            base64 -w0 release.jks
            echo ""
            echo "===================================================="
          fi

      - name: APK'yı imzala ve doğrula
        run: |
          set -e
          APK=build/app/outputs/flutter-apk/app-release.apk
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          APKSIGNER=$(ls "$SDK"/build-tools/*/apksigner | sort -V | tail -1)
          echo "apksigner: $APKSIGNER"
          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-key-alias dosyaokuyucu \
            --ks-pass pass:DosyaOkuyucuKey2026 \
            --key-pass pass:DosyaOkuyucuKey2026 \
            "$APK"
          echo "--- imza sertifikası ---"
          "$APKSIGNER" verify --print-certs "$APK" | grep -iE "SHA-256|SHA-1|Signer #1 cert" | head -5

      - name: APK'yı adlandır
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/dosya-okuyucu.apk

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: dosya-okuyucu-apk
          path: dist/dosya-okuyucu.apk
          if-no-files-found: error

      - name: GitHub Release oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-build-${{ github.run_number }}
          name: Dosya Okuyucu v0.1.0 (build ${{ github.run_number }})
          make_latest: true
          body: |
            Otomatik derlenen, imzalı Android APK.

            **Yenilikler (bu sürümde):**
            - “Birlikte aç” / paylaş: WhatsApp/Gmail/Dosyalar’dan gelen dosyayı doğrudan açar
            - Geniş dosya türü desteği + içerik tanıma (uzantısız metin dosyaları dahil)
            - Her yerde yakınlaştır/uzaklaştır (görsel: pinch + çift-dokun + düğme), döndürme
            - Belge içi arama (Bul), metinde yazı boyutu, PDF sayfa göstergesi
            - Office düzenleme: Word biçim, Excel satır/sütun + formül + sayı biçimleri, PowerPoint slayt işlemleri
            - AI hızlı komutlar (Özetle / Ana noktalar / Basit anlat)
            - Özel uygulama ikonu

            Çok formatlı görüntüleme (PDF, Word, Excel, Slayt, metin, görsel), PDF/Slayt
            dönüştürme, paylaşım, Gemini AI sohbet, Firebase senkron (yapılandırıldığında).

            APK'yı aşağıdaki **Assets** bölümünden indirin (dosya-okuyucu.apk).
            Kurulumda “bilinmeyen kaynak”a izin vermeniz gerekebilir.
          files: dist/dosya-okuyucu.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
