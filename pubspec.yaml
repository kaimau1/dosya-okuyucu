name: dosya_okuyucu
description: "Sade, hızlı ve efektif çok formatlı dosya okuyucu/düzenleyici (PDF, Word, Excel, Slayt) + Gemini AI."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Dosya seçme / yol
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # Başka uygulamalardan "Birlikte aç" / paylaş ile gelen dosyaları yakalama
  # (WhatsApp/Gmail'den atılan dosya doğrudan uygulamada açılır).
  receive_sharing_intent: ^1.8.1

  # Görüntüleyiciler
  # PDF: pdfium tabanlı pdfrx — sayfa üzerinde METİN SEÇME/kopyalama destekler
  # (pdfx bitmap çizdiği için seçim imkânsızdı). 1.3.x = Dart 3.7/Flutter 3.29
  # uyumlu son seri; 2.x Dart >=3.9 istiyor (CI 3.29.3'te derlenmez).
  pdfrx: ^1.3.0
  # Word'ü gerçek sayfa düzeniyle çizmek için (assets/word içindeki docx-preview
  # motoru gömülü çalışır — internet gerekmez)
  webview_flutter: ^4.10.0

  # Office (Open XML) okuma/yazma
  excel: ^4.0.6
  archive: ^3.6.1
  xml: ^6.5.0

  # AI (Gemini REST) & ağ
  http: ^1.2.2

  # Depolama / ayarlar
  shared_preferences: ^2.3.2

  # Dönüştürme (PDF üretimi) & paylaşım / yazdırma
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.2

  # Durum yönetimi (hafif)
  provider: ^6.1.2

  # 120Hz+ ekran desteği (Android 60Hz kilidini açar; diğer platformlarda pasif)
  flutter_displaymode: ^0.6.0

  # Firebase (giriş + bulut senkron) — config yoksa uygulama yerel modda çalışır
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Uygulama ikonunu (launcher + adaptive) tek kaynaktan üretir.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/word/

# Uygulama ikonu: assets/icon/ altındaki PNG'lerden CI'da üretilir
# (dart run flutter_launcher_icons). Zemin marka mavisi, ön-plan şeffaf belge.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#3B6EF6"
  adaptive_icon_foreground: "assets/icon/foreground.png"
