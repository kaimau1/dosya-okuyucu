<!--
  Word görüntüleyici kabuğu. İnternet YOK: jszip + docx-preview aynı klasörden,
  APK içine gömülü olarak yüklenir. Flutter tarafı renderDocx(base64) çağırır.
-->
<!-- TUZAK: meta viewport'u JS ile değiştirmek Android WebView'da yeniden
     sığdırma YAPMAZ. Bu yüzden sayfa CSS zoom ile ekrana sığdırılır (fitPage);
     viewport doğal ölçekte kalır, pinch bunun üzerine çarpan olarak biner.
     minimum-scale 0.5: sığdırılmış halin de altına uzaklaşılabilir. -->
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=6, user-scalable=yes">
<style>
  html, body { margin: 0; padding: 0; background: #f3f2f1; }
  #container { padding: 8px 0 24px; }
  /* docx-preview sayfayı beyaz bir "kağıt" olarak çizer; gölge ekleyip
     PowerPoint/Word hissini tamamlıyoruz. */
  .docx-wrapper { background: #f3f2f1 !important; padding: 8px !important; }
  .docx-wrapper > section.docx {
    box-shadow: 0 1px 6px rgba(0,0,0,.25);
    margin-bottom: 12px !important;
  }
  #err { font: 14px sans-serif; color: #b00020; padding: 16px; display: none; }
</style>
<div id="container"></div>
<div id="err"></div>
<script src="jszip.min.js"></script>
<script src="docx-preview.min.js"></script>
<script>
  function report(msg) {
    if (window.Durum) window.Durum.postMessage(msg);
  }

  window.renderDocx = function (b64) {
    try {
      var bin = atob(b64);
      var buf = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
      docx.renderAsync(buf.buffer, document.getElementById('container'), null, {
        inWrapper: true,
        ignoreWidth: false,
        ignoreHeight: true,
        breakPages: true,
        experimental: true,
        useBase64URL: true
      }).then(function () {
        fitPage();
        setTimeout(fitPage, 400); // görseller/yerleşim geciken sayfalar için ikinci tur
        report('ok');
      }).catch(function (e) {
        showError(e);
      });
    } catch (e) {
      showError(e);
    }
  };

  // ---- Canlı düzenleme köprüsü -------------------------------------------
  // Sayfa contenteditable yapılır; değişen paragraf 250ms sonra Flutter'a
  // {i: paragrafIndeksi, segs: [[metin,b,i,u],...]} olarak gönderilir (Kalem
  // kanalı). Paragraf sırası document.xml'deki w:p sırasıyla birebirdir
  // (başlık/altbilgi article dışında kaldığı için sayılmaz).
  var EDIT = false;
  var pending = {};

  function articles() {
    var a = document.querySelectorAll('.docx-wrapper section.docx article');
    return a.length ? a : document.querySelectorAll('.docx-wrapper section.docx');
  }

  function paraList() {
    var out = [];
    articles().forEach(function (a) {
      a.querySelectorAll('p').forEach(function (p) { out.push(p); });
    });
    return out;
  }

  // Paragraf listesi düzenleme boyunca önbellekte tutulur: her tuş vuruşunda
  // tüm belgeyi taramak büyük dosyalarda yazmayı kastırıyordu.
  var cachedParas = null;

  function setEditable(on) {
    EDIT = !!on;
    articles().forEach(function (a) {
      a.contentEditable = EDIT ? 'true' : 'false';
      a.spellcheck = false; // kırmızı dalgalı çizgi + denetim maliyeti olmasın
      a.setAttribute('autocorrect', 'off');
      a.setAttribute('autocapitalize', 'off');
    });
    cachedParas = EDIT ? paraList() : null;
    if (!EDIT && document.activeElement) document.activeElement.blur();
    // Flutter, paragraf sayısını kendi listesiyle karşılaştırıp eşleşmezse
    // düzenlemeyi kapatır (yanlış paragrafa yazma sigortası).
    if (EDIT && window.Kalem) {
      window.Kalem.postMessage(JSON.stringify({ n: cachedParas.length }));
    }
  }

  // Yapı beklenmedik şekilde değiştiyse (sigorta): sayıyı yeniden bildir.
  function structureChanged() {
    cachedParas = paraList();
    if (window.Kalem) {
      window.Kalem.postMessage(JSON.stringify({ n: cachedParas.length }));
    }
  }

  function segsOf(p) {
    var out = [];
    function walk(node, b, i, u) {
      if (node.nodeType === 3) {
        if (node.textContent) out.push([node.textContent, b, i, u]);
        return;
      }
      if (node.nodeType !== 1) return;
      if (node.nodeName === 'BR') { out.push(['\n', b, i, u]); return; }
      var cs = window.getComputedStyle(node);
      var nb = b || parseInt(cs.fontWeight, 10) >= 600 || cs.fontWeight === 'bold';
      var ni = i || cs.fontStyle === 'italic';
      var nu = u || ((cs.textDecorationLine || cs.textDecoration || '')
                       .indexOf('underline') >= 0);
      for (var c = node.firstChild; c; c = c.nextSibling) walk(c, nb, ni, nu);
    }
    walk(p, false, false, false);
    return out;
  }

  function sendPara(idx, p) {
    // Debounce'lu gönderimde ucuz yapı kontrolü: sayı değiştiyse eşleme
    // güvensiz → Flutter'a bildir, bu paragrafı gönderme.
    if (cachedParas && paraList().length !== cachedParas.length) {
      structureChanged();
      return;
    }
    if (window.Kalem) {
      window.Kalem.postMessage(JSON.stringify({ i: idx, segs: segsOf(p) }));
    }
  }

  document.addEventListener('input', function (e) {
    if (!EDIT || !cachedParas) return;
    var n = e.target;
    while (n && n.nodeType !== 1) n = n.parentNode;
    var p = n && n.closest ? n.closest('p') : null;
    if (!p) return;
    var idx = cachedParas.indexOf(p);
    if (idx < 0) { structureChanged(); return; }
    clearTimeout(pending[idx]);
    pending[idx] = setTimeout(function () { sendPara(idx, p); }, 250);
  });

  // Enter yeni <p> üretip paragraf eşlemesini bozardı → satır sonuna çevrilir
  // (kaydta w:br olur). Yapıştırma da düz metin olarak eklenir.
  document.addEventListener('keydown', function (e) {
    if (!EDIT) return;
    if (e.key === 'Enter') {
      e.preventDefault();
      document.execCommand('insertLineBreak');
    }
  });
  document.addEventListener('paste', function (e) {
    if (!EDIT) return;
    e.preventDefault();
    var t = (e.clipboardData || window.clipboardData).getData('text/plain');
    if (t) document.execCommand('insertText', false, t.replace(/\r/g, ''));
  });

  // Seçimin B/I/U durumu araç çubuğuna yansır (150ms kısıtlı).
  var selTimer = null;
  document.addEventListener('selectionchange', function () {
    if (!EDIT || !window.Kalem) return;
    clearTimeout(selTimer);
    selTimer = setTimeout(function () {
      window.Kalem.postMessage(JSON.stringify({
        sel: {
          b: document.queryCommandState('bold'),
          i: document.queryCommandState('italic'),
          u: document.queryCommandState('underline')
        }
      }));
    }, 150);
  });

  function fmt(cmd) { // bold | italic | underline | justifyLeft/Center/Right/Full
    document.execCommand(cmd, false, null);
    if (cmd.indexOf('justify') === 0) { sendAligns(); return; }
    syncSelection();
  }

  // Hizalama paragrafın <p> stiline yazılır (yapı değişmez, eşleme bozulmaz);
  // seçimdeki her paragrafın yeni hizası Flutter'a {a:{i,v}} olarak bildirilir,
  // kaydetmede w:jc olur.
  function sendAligns() {
    var s = window.getSelection();
    if (!s || !s.anchorNode || !window.Kalem) return;
    var list = paraList();
    function idxOf(node) {
      while (node && node.nodeType !== 1) node = node.parentNode;
      var p = node && node.closest ? node.closest('p') : null;
      return p ? list.indexOf(p) : -1;
    }
    var a = idxOf(s.anchorNode), f = idxOf(s.focusNode);
    if (a < 0 && f < 0) return;
    if (a < 0) a = f;
    if (f < 0) f = a;
    var from = Math.min(a, f), to = Math.max(a, f);
    for (var k = from; k <= to; k++) {
      var ta = window.getComputedStyle(list[k]).textAlign;
      var v = ta === 'center' ? 'center'
        : (ta === 'right' || ta === 'end') ? 'right'
        : ta === 'justify' ? 'both' : 'left';
      window.Kalem.postMessage(JSON.stringify({ a: { i: k, v: v } }));
    }
  }

  function syncSelection() {
    var s = window.getSelection();
    if (!s || !s.anchorNode) return;
    var list = paraList();
    function idxOf(node) {
      while (node && node.nodeType !== 1) node = node.parentNode;
      var p = node && node.closest ? node.closest('p') : null;
      return p ? list.indexOf(p) : -1;
    }
    var a = idxOf(s.anchorNode), f = idxOf(s.focusNode);
    if (a < 0 && f < 0) return;
    if (a < 0) a = f;
    if (f < 0) f = a;
    var from = Math.min(a, f), to = Math.max(a, f);
    for (var k = from; k <= to; k++) sendPara(k, list[k]);
  }

  // Sayfayı CSS zoom ile ekran genişliğine sığdırır: açılışta TÜM sayfa
  // görünür. pageW bir kez, zoom uygulanmadan ölçülür; döndürme/yeniden
  // boyutta aynı değerle yeniden sığdırılır.
  // Sağlamlaştırma: asenkron çizimde section henüz yerleşmemişse genişlik
  // 0/çok küçük gelir → ölçek uygulanmazdı ("sayfa sığmıyor" kök nedeni).
  // Bu durumda kısa aralıklarla yeniden denenir.
  var pageW = 0;
  var fitTries = 0;
  function fitPage() {
    var wrap = document.querySelector('.docx-wrapper');
    var sec = document.querySelector('.docx-wrapper > section.docx');
    if (!wrap || !sec) {
      if (fitTries++ < 20) setTimeout(fitPage, 150);
      return;
    }
    if (!pageW) {
      wrap.style.zoom = '';
      var w = Math.max(sec.offsetWidth, sec.scrollWidth);
      if (w < 100) {
        if (fitTries++ < 20) setTimeout(fitPage, 150);
        return;
      }
      pageW = w + 16;
    }
    var vw = document.documentElement.clientWidth || window.innerWidth;
    if (vw > 0 && pageW > 0) wrap.style.zoom = Math.min(1, vw / pageW);
  }
  window.addEventListener('resize', fitPage);

  function showError(e) {
    var el = document.getElementById('err');
    el.style.display = 'block';
    el.textContent = 'Belge görüntülenemedi: ' + e;
    report('hata: ' + e);
  }
</script>
